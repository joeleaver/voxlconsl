[book]
title = "voxlconsl"
description = "A fantasy console where the only graphics primitive is a voxel."
authors = ["Joe Leaver"]
language = "en"
multilingual = false
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/joeleaver/voxlconsl"
edit-url-template = "https://github.com/joeleaver/voxlconsl/edit/main/docs/{path}"
site-url = "/voxlconsl/"
additional-css = ["theme/voxlconsl.css"]
no-section-label = true

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true

[output.html.fold]
enable = true
level = 1

[output.html.print]
enable = true
