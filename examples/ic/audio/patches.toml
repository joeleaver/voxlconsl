# ── 11  thunder — filtered noise rumble for the title bolt ──────
#
# Triggered once per title-screen lightning strike. Noise through a
# very-low LP filter reads as a distant rumble; the slow filter env
# adds a "crack → roll" arc so it doesn't feel like flat static.

[[patch]]
slot = 11
name = "thunder"
kind = "synth"

[patch.osc1]
mode  = "noise"
level = 127

[patch.osc2]
mode  = "noise"
level = 0

[patch.filter]
mode      = "lp"
cutoff    = 600
resonance = 25

[patch.amp_env]
attack_ms  = 10
decay_ms   = 700
sustain    = 0
release_ms = 400

[patch.filter_env]
attack_ms  = 5
decay_ms   = 600
sustain    = 0
release_ms = 400
depth      = 80
