# ic audio patches — see SPEC.md §5.1 / §12.6.3.
#
# Title-screen "Firefighter Theme" routes its 11 melodic MIDI
# channels through 11 distinct synth voices so each instrument has
# its own colour. Drums (channel 10 / 0-indexed 9) bypass this
# table — the host kit handles them.
#
# Channel → patch routing lives in `src/audio.rs::init_title_music`:
#
#   MIDI ch  Track                    Patch slot   Voice
#   ────────────────────────────────────────────────────────────
#    1       Bass: Acoustic Piano     0  tri_sub      pure triangle sub
#    2       Bass: Organ              1  saw_bass     growly saw bass
#    3       Bass: Guitar (clean)     2  pluck_bass   plucked square bass
#    4       Bass: Bass               3  square_bass  round square bass
#    5       Synth: Electric Piano    4  square_lead  bright square lead
#    6       Synth: Guitar (clean)    5  saw_lead     saw lead w/ bite
#    7       Synth: Strings           6  string_pad   slow-attack pad
#    8       Synth: Brass             7  brass        punchy saw stab
#   10       Synth: Reed              8  reed         square w/ filter env
#   11       Synth: Synth Lead        9  sine_lead    pure sine
#   12       Synth: Singing Voice    10  voice_lead   pulse w/ vibrato

# ── 0  tri_sub — sub-octave triangle bass ────────────────────────

[[patch]]
slot = 0
name = "tri_sub"
kind = "synth"

[patch.osc1]
mode   = "triangle"
level  = 127
octave = -1

[patch.osc2]
mode         = "triangle"
detune_cents = 4
level        = 80
octave       = -1

[patch.filter]
mode      = "lp"
cutoff    = 1800
resonance = 10

[patch.amp_env]
attack_ms  = 4
decay_ms   = 140
sustain    = 95
release_ms = 90


# ── 1  saw_bass — growly low saw bass ────────────────────────────

[[patch]]
slot = 1
name = "saw_bass"
kind = "synth"

[patch.osc1]
mode   = "saw"
level  = 110
octave = -1

[patch.osc2]
mode         = "saw"
detune_cents = 7
level        = 80
octave       = -1

[patch.filter]
mode      = "lp"
cutoff    = 900
resonance = 40

[patch.amp_env]
attack_ms  = 3
decay_ms   = 130
sustain    = 80
release_ms = 70

[patch.filter_env]
attack_ms  = 3
decay_ms   = 160
sustain    = 30
release_ms = 80
depth      = 40


