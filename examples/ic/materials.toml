# Incident Command — material slot table (SPEC.md §12.6.2).
#
# Slot 0 is reserved for air. Slots 1-23 are world materials and
# actor pigments used by this cart. Future Phase-2 expansions
# (retardant, air tanker, hose crew) will sit in 24-31.

# ── Terrain ───────────────────────────────────────────────────────

[[material]]
slot  = 1
name  = "stone"
color = "cool_gray:1"

[[material]]
slot  = 2
name  = "dirt"
color = "brown:1"

[[material]]
slot  = 3
name  = "grass"
color = "grass_green:2"

# ── Forest ────────────────────────────────────────────────────────
# Pines: trunk catches slower than needles. Both ignite into fire (7).

[[material]]
slot         = 4
name         = "pine_wood"
color        = "brown:0"
flags        = ["flammable"]
# Tuned around the cart-side long-burn loop (see fire.rs). The CA's
# fire-temp is hard-coded at 15, so heat/tick = 15 × neighbour count.
# Bumped to 120 (was 30) — 8 ticks single-neighbour, 4 ticks
# double-neighbour. Slow enough that propagation through a tree's
# voxels takes seconds, not frames, so the burn_sites cap doesn't
# saturate from a single ignition and evict its own wavefront.
ca_threshold = 120
ignites_to   = 7

[[material]]
slot         = 5
name         = "pine_leaves"
color        = "forest_green:2"
flags        = ["flammable"]
# Was 80 originally → 15 → 45 → 180. With the long-burn loop holding
# each lit cell visible for ~6 s, propagation needs to be SLOW so the
# burn-sites cap (512) doesn't fill in seconds and evict wavefront
# entries before they finish burning. 180 = 12 ticks at one fire
# neighbour, 6 ticks at two, 4 ticks at three. With CA fire-life=15
# ticks, single-neighbour propagation only fires once the source has
# been burning a while — natural pacing.
ca_threshold = 180
ignites_to   = 7

# ── Liquids ───────────────────────────────────────────────────────

[[material]]
slot  = 6
name  = "water"
color = "cyan:2"
flags = ["liquid"]

# ── Fire + embers ─────────────────────────────────────────────────
# Fire CA caps lifetime at 15 ticks so each cell burns out quickly.
# Embers carry no CA flags — the cart's fire.rs steps them by hand.

[[material]]
slot        = 7
name        = "fire"
color       = "orange:3"
emission    = 14
flags       = ["fire"]
ca_lifetime = 15

[[material]]
slot     = 8
name     = "ember"
color    = "yellow:3"
emission = 15

# ── Town ──────────────────────────────────────────────────────────
# Cabins are treated lumber: higher ignition threshold than raw pine
# so the fire takes a beat to actually cross from the forest into a
# structure. Roof shingles catch a bit sooner — that's where embers
# tend to land.

[[material]]
slot         = 9
name         = "cabin_wood"
color        = "brown:3"
flags        = ["flammable"]
ca_threshold = 200
ignites_to   = 7

[[material]]
slot         = 10
name         = "cabin_roof"
color        = "red:1"
flags        = ["flammable"]
ca_threshold = 150
ignites_to   = 7

[[material]]
slot  = 11
name  = "road_dirt"
color = "tan:1"

# Firebreak — non-flammable dug-up strip. Bright sandy yellow with
# emission so the laid strip is unmistakable against grass / dirt
# in the overhead view. No flammable flag → §10.3 fire propagation
# stops here.
[[material]]
slot     = 12
name     = "firebreak_dirt"
color    = "yellow:1"
emission = 6

# ── UI / markers ──────────────────────────────────────────────────

[[material]]
slot     = 13
name     = "cursor_marker"
color    = "magenta:3"
emission = 15

[[material]]
slot     = 14
name     = "select_marker"
color    = "yellow:3"
emission = 15

[[material]]
slot  = 15
name  = "heli_pad"
color = "warm_gray:2"

# ── Unit pigments (actor volumes) ─────────────────────────────────

[[material]]
slot  = 16
name  = "helicopter_body"
color = "cool_gray:0"

[[material]]
slot     = 17
name     = "helicopter_rotor"
color    = "warm_gray:2"
emission = 4

[[material]]
slot     = 18
name     = "crew_body"
color    = "orange:3"
emission = 6

[[material]]
slot  = 19
name  = "crew_helmet"
color = "yellow:3"

[[material]]
slot     = 20
name     = "bucket_water"
color    = "cyan:3"
emission = 4

# ── HUD text + backing ────────────────────────────────────────────

[[material]]
slot     = 21
name     = "hud_text"
color    = "warm_gray:3"
emission = 15

[[material]]
slot  = 22
name  = "hud_outline"
color = "cool_gray:0"

# Win/lose flash colors live on slots 23-24 so the cart can repaint
# them in place without disturbing other slots.
[[material]]
slot     = 23
name     = "flash_win"
color    = "grass_green:3"
emission = 12

[[material]]
slot     = 24
name     = "flash_lose"
color    = "red:3"
emission = 12

# Planned-line preview — floating magenta voxels the cart paints
# along the segments of the player's in-progress fire-line draft
# AND of committed-but-still-pending fire lines. Cleared when the
# crew finishes walking the line, or when the player cancels a draft.
[[material]]
slot     = 25
name     = "planned_line"
color    = "magenta:3"
emission = 12

# Planned-water target — single floating cyan voxel the cart paints
# above the drop cell when a water-drop order is queued, so the
# player can see what's pending without reading the badge number.
# Cleared when the helicopter drops on the cell.
[[material]]
slot     = 26
name     = "planned_water"
color    = "cyan:3"
emission = 12

# Fire retardant — bright salmon-pink stripe painted by the
# retardant air tanker. Non-flammable (no flag → §10.3 CA can't
# propagate fire into it, cart-side ember + wind-spread checks are
# both flammable-allow-list so retardant gets snuff-on-contact for
# free). Persistent until burned off or overwritten by the player.
[[material]]
slot     = 27
name     = "retardant"
color    = "magenta:2"
emission = 4

# Planned-retardant target — a darker pink marker the cart paints
# at the dispatch cell so the player can see the incoming drop.
# Cleared when the tanker actually paints the strip.
[[material]]
slot     = 28
name     = "planned_retardant"
color    = "magenta:3"
emission = 12

# Air-tanker pigments. Body for the fuselage, a slightly lighter
# wing color, and a coloured nose stripe so the player can tell at
# a glance whether the incoming plane is carrying water (cyan) or
# retardant (pink). Wing pigment is shared.
[[material]]
slot  = 29
name  = "tanker_body"
color = "cool_gray:1"

[[material]]
slot  = 30
name  = "tanker_wing"
color = "cool_gray:2"

[[material]]
slot     = 31
name     = "tanker_water_stripe"
color    = "cyan:3"
emission = 6

[[material]]
slot     = 32
name     = "tanker_retardant_stripe"
color    = "magenta:3"
emission = 6

# Hot-shot drop plane nose stripe + parachute fabric. The drop plane
# shares the tanker body/wing pigments; the stripe identifies it as
# the personnel carrier rather than a water/retardant bomber.
[[material]]
slot     = 33
name     = "parachute"
color    = "warm_gray:3"
emission = 8

[[material]]
slot     = 34
name     = "hotshot_stripe"
color    = "yellow:3"
emission = 6

# Hot-shot crew pigments — distinct from the firetruck helmet so the
# player can tell hand-laid (hotshot) from truck-laid (firebreak)
# crews apart on the ground.
[[material]]
slot     = 35
name     = "hotshot_body"
color    = "red:2"
emission = 4

[[material]]
slot     = 36
name     = "hotshot_helmet"
color    = "yellow:2"

# Planned-hotshot preview voxel — same shape as planned_line / planned_water,
# painted along the waypoints of a queued or in-progress hotshot order so the
# player can see what's pending. Lemon-yellow to read distinctly from the
# magenta firebreak preview.
[[material]]
slot     = 37
name     = "planned_hotshot"
color    = "yellow:3"
emission = 12

# Fire-engine pigments. The chassis is classic fire-engine red so the
# unit reads distinct from the firetruck (which is the orange "crew"
# vehicle). The hose nozzle is a small dark voxel on top so the player
# can see which direction the engine is "spraying" at-a-glance.
[[material]]
slot     = 38
name     = "engine_body"
color    = "red:3"
emission = 6

[[material]]
slot  = 39
name  = "engine_hose"
color = "warm_gray:0"

# Title-screen flame — bright yellow at max emission. Red/orange
# blend into the magenta-and-orange sunset sky too much; the high
# green channel of yellow:3 (G=232 vs ~100 mid-gradient) makes the
# flames pop in front of the C. No CA flags so the flame is stable
# until the heli's drop clears it cell-by-cell.
[[material]]
slot     = 40
name     = "title_flame"
color    = "yellow:3"
emission = 15

# Char/scorch mark left on the title-screen "C" as the fire eats it.
# Darkest cool-gray shade so it reads as a soot stain against the
# stone-gray body of the letters.
[[material]]
slot  = 41
name  = "scorch"
color = "cool_gray:0"

# Title menu highlight — saturated cyan, complementary to the warm
# sunset sky so the selected option pops without competing with the
# fire/ember palette. Full emission to render at max-brightness
# shade regardless of light direction (screen-mode actors).
[[material]]
slot     = 42
name     = "title_menu"
color    = "cyan:3"
emission = 15

# Dark backing for the selected menu panel — near-black so the
# bright cyan text and border lines sit on top with maximum
# contrast against the warm sunset sky behind it.
[[material]]
slot  = 43
name  = "title_menu_bg"
color = "cool_gray:0"

# Title-screen lightning bolt — bright yellow at max emission so the
# jagged voxel column reads like a real strike against the dusky
# sunset sky. Painted for ~220 ms before the fire takes hold.
[[material]]
slot     = 44
name     = "title_lightning"
color    = "yellow:3"
emission = 15

# Lake water. Visually identical to dropped water (M_WATER, slot 6)
# but with NO `liquid` flag — sits permanently in the terrain basin
# without participating in the §10.3 liquid CA. The cart's
# water.rs tracker only ever clears M_WATER cells, so isolating the
# lake into its own slot means the evaporation sweep can never
# accidentally drain the lake.
[[material]]
slot  = 45
name  = "lake_water"
color = "cyan:2"
