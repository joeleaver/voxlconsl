# Incident Command — material slot table (SPEC.md §12.6.2).
#
# Slot 0 is reserved for air. Slots 1-23 are world materials and
# actor pigments used by this cart. Future Phase-2 expansions
# (retardant, air tanker, hose crew) will sit in 24-31.

# ── Terrain ───────────────────────────────────────────────────────

[[material]]
slot  = 1
name  = "stone"
color = "cool_gray:1"

[[material]]
slot  = 2
name  = "dirt"
color = "brown:1"

[[material]]
slot  = 3
name  = "grass"
color = "grass_green:2"

# ── Forest ────────────────────────────────────────────────────────
# Pines: trunk catches slower than needles. Both ignite into fire (7).

[[material]]
slot         = 4
name         = "pine_wood"
color        = "brown:0"
flags        = ["flammable"]
ca_threshold = 180
ignites_to   = 7

[[material]]
slot         = 5
name         = "pine_leaves"
color        = "forest_green:2"
flags        = ["flammable"]
ca_threshold = 80
ignites_to   = 7

# ── Liquids ───────────────────────────────────────────────────────

[[material]]
slot  = 6
name  = "water"
color = "cyan:2"
flags = ["liquid"]

# ── Fire + embers ─────────────────────────────────────────────────
# Fire CA caps lifetime at 15 ticks so each cell burns out quickly.
# Embers carry no CA flags — the cart's fire.rs steps them by hand.

[[material]]
slot        = 7
name        = "fire"
color       = "orange:3"
emission    = 14
flags       = ["fire"]
ca_lifetime = 15

[[material]]
slot     = 8
name     = "ember"
color    = "yellow:3"
emission = 15

# ── Town ──────────────────────────────────────────────────────────
# Cabins are treated lumber: higher ignition threshold than raw pine
# so the fire takes a beat to actually cross from the forest into a
# structure. Roof shingles catch a bit sooner — that's where embers
# tend to land.

[[material]]
slot         = 9
name         = "cabin_wood"
color        = "brown:3"
flags        = ["flammable"]
ca_threshold = 200
ignites_to   = 7

[[material]]
slot         = 10
name         = "cabin_roof"
color        = "red:1"
flags        = ["flammable"]
ca_threshold = 150
ignites_to   = 7

[[material]]
slot  = 11
name  = "road_dirt"
color = "tan:1"

# Firebreak — non-flammable dug-up strip. Bright sandy yellow with
# emission so the laid strip is unmistakable against grass / dirt
# in the overhead view. No flammable flag → §10.3 fire propagation
# stops here.
[[material]]
slot     = 12
name     = "firebreak_dirt"
color    = "yellow:1"
emission = 6

# ── UI / markers ──────────────────────────────────────────────────

[[material]]
slot     = 13
name     = "cursor_marker"
color    = "magenta:3"
emission = 15

[[material]]
slot     = 14
name     = "select_marker"
color    = "yellow:3"
emission = 15

[[material]]
slot  = 15
name  = "heli_pad"
color = "warm_gray:2"

# ── Unit pigments (actor volumes) ─────────────────────────────────

[[material]]
slot  = 16
name  = "helicopter_body"
color = "cool_gray:0"

[[material]]
slot     = 17
name     = "helicopter_rotor"
color    = "warm_gray:2"
emission = 4

[[material]]
slot     = 18
name     = "crew_body"
color    = "orange:3"
emission = 6

[[material]]
slot  = 19
name  = "crew_helmet"
color = "yellow:3"

[[material]]
slot     = 20
name     = "bucket_water"
color    = "cyan:3"
emission = 4

# ── HUD text + backing ────────────────────────────────────────────

[[material]]
slot     = 21
name     = "hud_text"
color    = "warm_gray:3"
emission = 15

[[material]]
slot  = 22
name  = "hud_outline"
color = "cool_gray:0"

# Win/lose flash colors live on slots 23-24 so the cart can repaint
# them in place without disturbing other slots.
[[material]]
slot     = 23
name     = "flash_win"
color    = "grass_green:3"
emission = 12

[[material]]
slot     = 24
name     = "flash_lose"
color    = "red:3"
emission = 12

# Planned-line preview — floating magenta voxels the cart paints
# along the segments of the player's in-progress fire-line draft
# AND of committed-but-still-pending fire lines. Cleared when the
# crew finishes walking the line, or when the player cancels a draft.
[[material]]
slot     = 25
name     = "planned_line"
color    = "magenta:3"
emission = 12

# Planned-water target — single floating cyan voxel the cart paints
# above the drop cell when a water-drop order is queued, so the
# player can see what's pending without reading the badge number.
# Cleared when the helicopter drops on the cell.
[[material]]
slot     = 26
name     = "planned_water"
color    = "cyan:3"
emission = 12

# Fire retardant — bright salmon-pink stripe painted by the
# retardant air tanker. Non-flammable (no flag → §10.3 CA can't
# propagate fire into it, cart-side ember + wind-spread checks are
# both flammable-allow-list so retardant gets snuff-on-contact for
# free). Persistent until burned off or overwritten by the player.
[[material]]
slot     = 27
name     = "retardant"
color    = "magenta:2"
emission = 4

# Planned-retardant target — a darker pink marker the cart paints
# at the dispatch cell so the player can see the incoming drop.
# Cleared when the tanker actually paints the strip.
[[material]]
slot     = 28
name     = "planned_retardant"
color    = "magenta:3"
emission = 12

# Air-tanker pigments. Body for the fuselage, a slightly lighter
# wing color, and a coloured nose stripe so the player can tell at
# a glance whether the incoming plane is carrying water (cyan) or
# retardant (pink). Wing pigment is shared.
[[material]]
slot  = 29
name  = "tanker_body"
color = "cool_gray:1"

[[material]]
slot  = 30
name  = "tanker_wing"
color = "cool_gray:2"

[[material]]
slot     = 31
name     = "tanker_water_stripe"
color    = "cyan:3"
emission = 6

[[material]]
slot     = 32
name     = "tanker_retardant_stripe"
color    = "magenta:3"
emission = 6

# Hot-shot drop plane nose stripe + parachute fabric. The drop plane
# shares the tanker body/wing pigments; the stripe identifies it as
# the personnel carrier rather than a water/retardant bomber.
[[material]]
slot     = 33
name     = "parachute"
color    = "warm_gray:3"
emission = 8

[[material]]
slot     = 34
name     = "hotshot_stripe"
color    = "yellow:3"
emission = 6

# Hot-shot crew pigments — distinct from the firetruck helmet so the
# player can tell hand-laid (hotshot) from truck-laid (firebreak)
# crews apart on the ground.
[[material]]
slot     = 35
name     = "hotshot_body"
color    = "red:2"
emission = 4

[[material]]
slot     = 36
name     = "hotshot_helmet"
color    = "yellow:2"

# Planned-hotshot preview voxel — same shape as planned_line / planned_water,
# painted along the waypoints of a queued or in-progress hotshot order so the
# player can see what's pending. Lemon-yellow to read distinctly from the
# magenta firebreak preview.
[[material]]
slot     = 37
name     = "planned_hotshot"
color    = "yellow:3"
emission = 12

# Fire-engine pigments. The chassis is classic fire-engine red so the
# unit reads distinct from the firetruck (which is the orange "crew"
# vehicle). The hose nozzle is a small dark voxel on top so the player
# can see which direction the engine is "spraying" at-a-glance.
[[material]]
slot     = 38
name     = "engine_body"
color    = "red:3"
emission = 6

[[material]]
slot  = 39
name  = "engine_hose"
color = "warm_gray:0"
